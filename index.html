<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog API - Interface de gestion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        }
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .article-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }
        .article-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .article-card h3 {
            color: #333;
            margin-bottom: 10px;
        }
        .article-card .meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        .article-card .content {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            max-height: 100px;
            overflow: hidden;
        }
        .article-card .tags {
            font-size: 12px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .article-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .article-actions button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
        }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filters input, .filters select {
            width: auto;
            flex: 1;
            min-width: 150px;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 {
            color: #667eea;
        }
        .close-modal {
            cursor: pointer;
            font-size: 24px;
            color: #888;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }
        .stat-box h3 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .links {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Blog API - Gestion des Articles</h1>
        
        <div class="stats">
            <div class="stat-box">
                <h3 id="totalArticles">0</h3>
                <p>Articles total</p>
            </div>
            <div class="stat-box">
                <h3 id="categoriesCount">0</h3>
                <p>Catégories</p>
            </div>
            <div class="stat-box">
                <h3 id="authorsCount">0</h3>
                <p>Auteurs</p>
            </div>
        </div>
        
        <div class="card">
            <h2>➕ Créer un nouvel article</h2>
            <div id="createMessage" class="message"></div>
            <form id="createForm">
                <div class="form-group">
                    <label>Titre *</label>
                    <input type="text" id="titre" required>
                </div>
                <div class="form-group">
                    <label>Contenu *</label>
                    <textarea id="contenu" required></textarea>
                </div>
                <div class="form-group">
                    <label>Auteur *</label>
                    <input type="text" id="auteur" required>
                </div>
                <div class="form-group">
                    <label>Catégorie</label>
                    <input type="text" id="categorie" placeholder="Ex: Technologie, Sport, Cuisine...">
                </div>
                <div class="form-group">
                    <label>Tags (séparés par des virgules)</label>
                    <input type="text" id="tags" placeholder="Ex: nodejs, javascript, api">
                </div>
                <button type="submit">📌 Créer l'article</button>
            </form>
        </div>
        
        <div class="card">
            <h2>🔍 Rechercher et filtrer</h2>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Rechercher par titre ou contenu...">
                <button id="searchBtn">🔍 Rechercher</button>
                <button id="resetSearchBtn" class="btn-warning">🔄 Réinitialiser</button>
            </div>
            <div class="filters">
                <input type="text" id="filterCategorie" placeholder="Filtrer par catégorie">
                <input type="text" id="filterAuteur" placeholder="Filtrer par auteur">
                <input type="date" id="filterDate" placeholder="Filtrer par date">
                <button id="applyFiltersBtn">📊 Appliquer filtres</button>
                <button id="resetFiltersBtn" class="btn-warning">🔄 Réinitialiser filtres</button>
            </div>
        </div>
        
        <div class="card">
            <h2>📚 Liste des articles</h2>
            <div id="articlesList" class="articles-grid">
                <p style="text-align: center; grid-column: 1/-1;">Chargement des articles...</p>
            </div>
        </div>
        
        <div class="links">
            <a href="/api-docs" target="_blank">📖 Documentation Swagger</a>
            <a href="/api/articles" target="_blank">🔗 API Endpoint (GET /api/articles)</a>
        </div>
    </div>
    
    <!-- Modal pour modifier un article -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ Modifier l'article</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div id="editMessage" class="message"></div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" id="editTitre" required>
                </div>
                <div class="form-group">
                    <label>Contenu</label>
                    <textarea id="editContenu" required></textarea>
                </div>
                <div class="form-group">
                    <label>Auteur</label>
                    <input type="text" id="editAuteur" required>
                </div>
                <div class="form-group">
                    <label>Catégorie</label>
                    <input type="text" id="editCategorie">
                </div>
                <div class="form-group">
                    <label>Tags</label>
                    <input type="text" id="editTags">
                </div>
                <button type="submit">💾 Enregistrer les modifications</button>
            </form>
        </div>
    </div>
    
    <script>
        let currentArticles = [];
        
        function showMessage(element, message, type) {
            element.textContent = message;
            element.className = 'message ' + type;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }
        
        async function loadArticles() {
            try {
                const response = await fetch('/api/articles');
                const articles = await response.json();
                currentArticles = articles;
                displayArticles(articles);
                updateStats(articles);
            } catch (error) {
                console.error('Erreur:', error);
            }
        }
        
        function updateStats(articles) {
            document.getElementById('totalArticles').textContent = articles.length;
            const categories = new Set(articles.map(a => a.categorie).filter(c => c));
            const authors = new Set(articles.map(a => a.auteur).filter(a => a));
            document.getElementById('categoriesCount').textContent = categories.size;
            document.getElementById('authorsCount').textContent = authors.size;
        }
        
        function displayArticles(articles) {
            const container = document.getElementById('articlesList');
            if (articles.length === 0) {
                container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Aucun article trouvé</p>';
                return;
            }
            
            container.innerHTML = articles.map(article => `
                <div class="article-card">
                    <h3>${escapeHtml(article.titre)}</h3>
                    <div class="meta">
                        ✍️ ${escapeHtml(article.auteur)} | 📅 ${new Date(article.date).toLocaleDateString('fr-FR')}
                        ${article.categorie ? ` | 📁 ${escapeHtml(article.categorie)}` : ''}
                    </div>
                    <div class="content">${escapeHtml(article.contenu.substring(0, 150))}${article.contenu.length > 150 ? '...' : ''}</div>
                    ${article.tags ? `<div class="tags">🏷️ ${escapeHtml(article.tags)}</div>` : ''}
                    <div class="article-actions">
                        <button onclick="openEditModal(${article.id})">✏️ Modifier</button>
                        <button class="btn-danger" onclick="deleteArticle(${article.id})">🗑️ Supprimer</button>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const article = {
                titre: document.getElementById('titre').value,
                contenu: document.getElementById('contenu').value,
                auteur: document.getElementById('auteur').value,
                categorie: document.getElementById('categorie').value,
                tags: document.getElementById('tags').value
            };
            
            try {
                const response = await fetch('/api/articles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(article)
                });
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(document.getElementById('createMessage'), 'Article créé avec succès !', 'success');
                    document.getElementById('createForm').reset();
                    loadArticles();
                } else {
                    showMessage(document.getElementById('createMessage'), data.errors ? data.errors.join(', ') : 'Erreur lors de la création', 'error');
                }
            } catch (error) {
                showMessage(document.getElementById('createMessage'), 'Erreur réseau', 'error');
            }
        });
        
        async function deleteArticle(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer cet article ?')) return;
            
            try {
                const response = await fetch(`/api/articles/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadArticles();
                } else {
                    alert('Erreur lors de la suppression');
                }
            } catch (error) {
                console.error('Erreur:', error);
            }
        }
        
        async function openEditModal(id) {
            try {
                const response = await fetch(`/api/articles/${id}`);
                const article = await response.json();
                
                document.getElementById('editId').value = article.id;
                document.getElementById('editTitre').value = article.titre;
                document.getElementById('editContenu').value = article.contenu;
                document.getElementById('editAuteur').value = article.auteur;
                document.getElementById('editCategorie').value = article.categorie || '';
                document.getElementById('editTags').value = article.tags || '';
                
                document.getElementById('editModal').style.display = 'flex';
            } catch (error) {
                console.error('Erreur:', error);
            }
        }
        
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const article = {
                titre: document.getElementById('editTitre').value,
                contenu: document.getElementById('editContenu').value,
                auteur: document.getElementById('editAuteur').value,
                categorie: document.getElementById('editCategorie').value,
                tags: document.getElementById('editTags').value
            };
            
            try {
                const response = await fetch(`/api/articles/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(article)
                });
                
                if (response.ok) {
                    showMessage(document.getElementById('editMessage'), 'Article modifié avec succès !', 'success');
                    setTimeout(() => {
                        closeModal();
                        loadArticles();
                    }, 1500);
                } else {
                    showMessage(document.getElementById('editMessage'), 'Erreur lors de la modification', 'error');
                }
            } catch (error) {
                showMessage(document.getElementById('editMessage'), 'Erreur réseau', 'error');
            }
        });
        
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const query = document.getElementById('searchInput').value;
            if (!query) {
                loadArticles();
                return;
            }
            try {
                const response = await fetch(`/api/articles/search?query=${encodeURIComponent(query)}`);
                const articles = await response.json();
                displayArticles(articles);
                updateStats(articles);
            } catch (error) {
                console.error('Erreur:', error);
            }
        });
        
        document.getElementById('resetSearchBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            loadArticles();
        });
        
        document.getElementById('applyFiltersBtn').addEventListener('click', async () => {
            const categorie = document.getElementById('filterCategorie').value;
            const auteur = document.getElementById('filterAuteur').value;
            const date = document.getElementById('filterDate').value;
            
            let url = '/api/articles?';
            if (categorie) url += `categorie=${encodeURIComponent(categorie)}&`;
            if (auteur) url += `auteur=${encodeURIComponent(auteur)}&`;
            if (date) url += `date=${date}&`;
            
            try {
                const response = await fetch(url);
                const articles = await response.json();
                displayArticles(articles);
                updateStats(articles);
            } catch (error) {
                console.error('Erreur:', error);
            }
        });
        
        document.getElementById('resetFiltersBtn').addEventListener('click', () => {
            document.getElementById('filterCategorie').value = '';
            document.getElementById('filterAuteur').value = '';
            document.getElementById('filterDate').value = '';
            loadArticles();
        });
        
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeModal();
            }
        };
        
        loadArticles();
    </script>
</body>
</html>
